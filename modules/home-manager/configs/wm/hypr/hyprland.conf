################
### MONITORS ###
################
monitor = eDP-1, 2256x1504@60, 0x0, 1 # default setup for my laptop

source = ~/.config/hypr/monitors.conf

###################
### MY PROGRAMS ###
###################

# Set programs that you use
$terminal = alacritty
$fileManager = $terminal -e ranger
$menu = rofi -show run
$browser = librewolf

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = tomat daemon start
exec-once = slack
exec-once = neomutt-solo
exec-once = hyprctl setcursor mochaDark 24
exec-once = hyprpaper
exec-once = vesktop
exec-once = signal-desktop
exec-once = hypridle
# exec-once = noisetorch -i
exec-once = waybar
exec-once = hyprdynamicmonitors run

#########################################
### OPEN THINGS IN SPECIFIC WORKSPACE ###
#########################################

windowrule {
	name = signal_workspace
	match:class = signal
	workspace = 11
}

windowrule {
	name = vesktop_workspace
	match:class = vesktop
	workspace = 11
}

windowrule {
	name = slack_workspace
	match:class = Slack
	workspace = 12
}

windowrule {
	name = neomutt_workspace
	match:class = neomuttTerm
	workspace = 12
}

windowrule {
	name = float_terminal
	match:class = floatTerm
	float = 1
}


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = XCURSOR_THEME, catppuccin-mocha-dark-cursors
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME, catppuccin-mocha-dark-cursors
exec-once = hyprctl setcursor catppuccin-mocha-dark-cursors 24


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 5

    border_size = 1

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    #col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.active_border = rgba(c4a2ffff) rgba(04dff9ff) 45deg
    #col.active_border = rgba(c4a2ffff)
    col.inactive_border = rgba(363645cc)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 8
	rounding_power = 2.0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# No animaation for ueberzug for terminal images
# windowrulev2 = noanim, class: ^(ueberzugpp_.*)$
windowrule {
	name = ueberzug_noamin
	match:class = (ueberzugpp_.*)$
	no_anim = on
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrulev2 = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = rounding 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
# windowrulev2 = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
    force_split = 2
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {


    kb_layout = us
    kb_variant =
    kb_model =
	kb_options = caps:escape
    kb_rules =

    follow_mouse = 2

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
#gestures {
#    workspace_swipe = false
#}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
$modShift = SUPER_SHIFT
$modCtrl = SUPER_CTRL
$ultraMod = SUPER_CTRL_SHIFT

bind = CTRL ALT, L, exec, hyprlock
bind = $modCtrl, r, exec, hyprctl reload

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $modShift, q, killactive,
bind = $modCtrl, e, exec, rofi -show power -modes 'power:rofi_power'




bind = $mainMod, return, exec, $terminal
bind = $modShift, space, togglefloating,
bind = $mainMod, d, exec, $menu
bind = $mainMod, i, exec, $browser
bind = $mainMod, s, exec, rofi -show ssh
bind = $mainMod, Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = $modShift, P, exec, rofi -show pass -modes 'pass:rofi_pass'
bind = $mainMod, F7, exec, rofi -show audio -modes 'audio:rofi_audio_output'
bind = $mainMod, F8, exec, rofi -show monitor -modes 'monitor:rofi_monitor'
bind = $mainMod, F11, exec, rofi -show mount -modes 'mount:rofi_mount'
bind = $mainMod, F12, exec, rofi -show unmount -modes 'unmount:rofi_unmount'

bind = $mainMod, X, togglespecialworkspace, prod

## Floating terminal programs
bind = $mainMod, t, exec, alacritty --config-file /home/jason/.config/alacritty/float.toml
bind = $mainMod, m, exec, alacritty --config-file /home/jason/.config/alacritty/float.toml -e ncmpcpp
bind = $mainMod, c, exec, alacritty --config-file /home/jason/.config/alacritty/float.toml -e ikhal
bind = $mainMod, u, exec, alacritty --config-file /home/jason/.config/alacritty/float.toml -e ranger
bind = $mainMod, n, exec, alacritty --config-file /home/jason/.config/alacritty/float.toml --working-directory=$HOME/nixos

bind = $mainMod, f, fullscreen, 1

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod, Tab, cyclenext, floating
bind = $modShift, Tab, cyclenext, prev floating

# Resize windows with mainMod + SHIFT + HJKL
bind = $modShift, h, resizeactive, -50 0
bind = $modShift, l, resizeactive, 50 0
bind = $modShift, k, resizeactive, 0 -50
bind = $modShift, j, resizeactive, 0 50

# Move windows with mainMod + CTRL + HJKL
bind = $modCtrl, h, movewindow, l
bind = $modCtrl, l, movewindow, r
bind = $modCtrl, k, movewindow, u
bind = $modCtrl, j, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, minus, workspace, 11
bind = $mainMod, equal, workspace, 12

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $modShift, 1, movetoworkspacesilent, 1
bind = $modShift, 2, movetoworkspacesilent, 2
bind = $modShift, 3, movetoworkspacesilent, 3
bind = $modShift, 4, movetoworkspacesilent, 4
bind = $modShift, 5, movetoworkspacesilent, 5
bind = $modShift, 6, movetoworkspacesilent, 6
bind = $modShift, 7, movetoworkspacesilent, 7
bind = $modShift, 8, movetoworkspacesilent, 8
bind = $modShift, 9, movetoworkspacesilent, 9
bind = $modShift, 0, movetoworkspacesilent, 10
bind = $modShift, minus, movetoworkspacesilent, 11
bind = $modShift, equal, movetoworkspacesilent, 12

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $ultraMod, 1, movetoworkspace, 1
bind = $ultraMod, 2, movetoworkspace, 2
bind = $ultraMod, 3, movetoworkspace, 3
bind = $ultraMod, 4, movetoworkspace, 4
bind = $ultraMod, 5, movetoworkspace, 5
bind = $ultraMod, 6, movetoworkspace, 6
bind = $ultraMod, 7, movetoworkspace, 7
bind = $ultraMod, 8, movetoworkspace, 8
bind = $ultraMod, 9, movetoworkspace, 9
bind = $ultraMod, 0, movetoworkspace, 10
bind = $ultraMod, minus, movetoworkspace, 11
bind = $ultraMod, equal, movetoworkspace, 12

# Example special workspace (scratchpad)
#bind = $mainMod, s, togglespecialworkspace, magic
#bind = $modShift, s, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
#bind = $mainMod, mouse_down, workspace, e+1
#bind = $mainMod, mouse_up, workspace, e-1

# Move workspace to adjacent monitor
bind = $modShift, comma , movecurrentworkspacetomonitor, l
bind = $modShift, period , movecurrentworkspacetomonitor, r

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, ~/.local/bin/dunst_volume_control up
bindel = ,XF86AudioLowerVolume, exec, ~/.local/bin/dunst_volume_control down
bindel = ,XF86AudioMute, exec, ~/.local/bin/dunst_volume_control mute
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, ~/.local/bin/dunst_brightness_control up
bindel = ,XF86MonBrightnessDown, exec, ~/.local/bin/dunst_brightness_control down

# Requires playerctl
bindl = , XF86AudioNext, exec, mpc next
bindl = , XF86AudioPlay, exec, mpc toggle
bindl = , XF86AudioPrev, exec, mpc prev

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
#windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# Zoom popup fix
windowrule {
	name = zoom_popup_fix
	match:class = zoom
	match:title = menu window
	stay_focused = on
}
