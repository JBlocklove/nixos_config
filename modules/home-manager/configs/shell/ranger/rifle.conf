# Syntax: <condition1> , <condition2> , ... = command
#
# Flags:
#   f | Fork program to background (for GUI apps)
#   t | Run program in a new terminal
#   r | Run with root permissions

# -------------------------------------------
# Custom & specific software (High Priority)
# -------------------------------------------
# Spreadsheet
ext csv, flag f = foot -e sc-im "$@"

# Vivado Projects
ext xpr, has vivado, flag f, X = vivado -p "$1"

# 3D Printing (Prusa Slicer)
ext stl|3mf, has prusa-slicer, flag f, X = prusa-slicer "$1"

# -------------------------------------------
# Websites / HTML
# -------------------------------------------
ext x?html?, has librewolf, X, flag f = librewolf -- "$@"
ext x?html?, has firefox,   X, flag f = firefox -- "$@"
ext x?html?, has chromium,  X, flag f = chromium -- "$@"

# -------------------------------------------
# Text Editors
# -------------------------------------------
# Define the editor for text files
mime ^text,  label editor, flag f = foot -e nvim -- "$@"
mime ^text,  label pager          = "$PAGER" -- "$@"

# Open scripts/code in your editor
!mime ^text, label editor, ext xml|json|csv|tex|py|pl|rb|js|sh|php = ${VISUAL:-$EDITOR} -- "$@"
!mime ^text, label pager,  ext xml|json|csv|tex|py|pl|rb|js|sh|php = "$PAGER" -- "$@"

# Executable scripts
ext py  = python -- "$1"
ext js  = node -- "$1"
ext sh  = sh -- "$1"

# -------------------------------------------
# Documents
# -------------------------------------------
# PDFs
ext pdf, has zathura, X, flag f = zathura -- "$@"
ext pdf, has evince,  X, flag f = evince -- "$@"
ext pdf, has mupdf,   X, flag f = mupdf "$@"

# Office Documents
ext pptx?|od[dfgpst]|docx?|sxc|xlsx?|xlt|xlw|gnm|gnumeric, has libreoffice, X, flag f = libreoffice "$@"

# E-books
ext epub|mobi, has ebook-viewer, X, flag f = ebook-viewer -- "$@"

# -------------------------------------------
# Media (Audio / Video / Images)
# -------------------------------------------
# Images
mime ^image/svg, has inkscape, X, flag f = inkscape -- "$@"
mime ^image,     has sxiv,     X, flag f = sxiv -- "$@"
mime ^image,     has feh,      X, flag f = feh -- "$@"
mime ^image,     has eog,      X, flag f = eog -- "$@"
ext xcf,                       X, flag f = gimp -- "$@"

# Audio / Video
mime ^video|audio, has mpv,  X, flag f = mpv -- "$@"
mime ^video|audio, has vlc,  X, flag f = vlc -- "$@"

# Terminal-only fallback for audio/video (No X server running)
mime ^video|audio, terminal, !X, has mpv = mpv -- "$@"

# -------------------------------------------
# Archives
# -------------------------------------------
# Note: Since you use the 'e' key to extract via your Python script, 
# pressing 'Enter' on archives here will simply list their contents in the pager.
ext tar|gz|bz2|xz, has tar   = tar vvtf "$1" | "$PAGER"
ext zip,           has unzip = unzip -l "$1" | less
ext 7z,            has 7z    = 7z -p l "$@" | "$PAGER"
ext rar,           has unrar = unrar l "$1" | less

# -------------------------------------------
# Miscellaneous & Fallbacks
# -------------------------------------------
name ^[mM]akefile$ = make
ext 1              = man "$1"
ext exe            = wine "$1"

# Set wallpapers with Feh
label wallpaper, number 11, mime ^image, has feh, X = feh --bg-scale "$1"
label wallpaper, number 12, mime ^image, has feh, X = feh --bg-fill "$1"

# Absolute Fallbacks: Ask what to do, or execute if it's an executable
              !mime ^text, !ext xml|json|csv|tex|py|pl|rb|js|sh|php  = ask
label editor, !mime ^text, !ext xml|json|csv|tex|py|pl|rb|js|sh|php  = ${VISUAL:-$EDITOR} -- "$@"
mime application/x-executable = "$1"
